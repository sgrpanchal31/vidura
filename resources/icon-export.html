<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@1,60,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: transparent;
      }
      .icon {
        width: 1024px;
        height: 1024px;
        background: #f4efe4;
        border-radius: 229px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .v {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 300;
        font-variation-settings: 'opsz' 60;
        font-size: 680px;
        color: #6b2424;
        line-height: 1;
        margin-top: 140px;
      }
    </style>
  </head>
  <body>
    <div class="icon"><span class="v">V</span></div>
  </body>
</html>
