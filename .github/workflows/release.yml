name: Release

# Triggers when you push a version tag: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

# Needs write access to create a GitHub Release and upload the DMG.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm to v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # The stock llama.cpp bundled with node-llama-cpp cannot load the Gemma 4
      # models: the app needs llama.cpp b8750 with the Gemma 4 E4B patch compiled
      # in (same step as local `npm run dist:mac`). Takes ~5 minutes.
      - name: Build patched llama.cpp
        run: npm run llama:update

      - name: Build
        run: npm run build

      - name: Package and sign DMG
        run: bash scripts/package-mac.sh

      # Create a GitHub Release for this tag and attach the .dmg file.
      # GITHUB_TOKEN is provided automatically — no secrets to configure.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vidura-arm64.dmg
          draft: false
          generate_release_notes: false
          body: |
            ## Install

            **Recommended — one-line installer (Apple Silicon only):**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/sgrpanchal31/vidura/main/scripts/install.sh | bash
            ```

            This downloads the app, installs it to `/Applications`, and removes the quarantine flag so it opens cleanly.

            **Already installed?** Vidura checks for updates on launch and can update itself from Settings > About. Re-running the install command also works.

            ---

            **Manual install:**

            1. Download `vidura-arm64.dmg` below (Apple Silicon only).
            2. Open the DMG and drag `Vidura.app` to `/Applications`.
            3. Run this once in Terminal to remove the quarantine flag:
               ```bash
               xattr -cr /Applications/Vidura.app
               ```
            4. Open the app normally.

            > **Why the Terminal step?** macOS marks every downloaded file as quarantined. Because this app is self-signed (no Apple Developer account), Gatekeeper shows "damaged" instead of an "open anyway?" prompt. The `xattr` command removes that flag — the file is not actually damaged.
