name: Release

# Triggers when you push a version tag: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

# Needs write access to create a GitHub Release and upload the DMG.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm to v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      # Bypass electron-builder's JS-based node_modules scanner (OOMs on this project's
      # dep tree). Instead: download the Electron binary, assemble the .app with cp,
      # and wrap it in a DMG with hdiutil — all shell, no JS scanning.
      - name: Package .app
        env:
          ELECTRON_VERSION: '31.7.7'
        run: |
          curl -sL "https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/electron-v${ELECTRON_VERSION}-darwin-arm64.zip" \
            -o /tmp/electron.zip
          unzip -q /tmp/electron.zip -d /tmp/electron-dist

          mkdir -p dist
          cp -r "/tmp/electron-dist/Electron.app" "dist/openbook-lm.app"

          APP_RES="dist/openbook-lm.app/Contents/Resources/app"
          mkdir -p "$APP_RES"
          cp package.json "$APP_RES/"
          cp -r out "$APP_RES/"
          cp -r node_modules "$APP_RES/"

          PLIST="dist/openbook-lm.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName openbook-lm" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.openbooklm.app" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable openbook-lm" "$PLIST"
          mv "dist/openbook-lm.app/Contents/MacOS/Electron" \
             "dist/openbook-lm.app/Contents/MacOS/openbook-lm"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "openbook-lm" \
            -srcfolder "dist/openbook-lm.app" \
            -ov -format UDZO \
            "dist/openbook-lm-arm64.dmg"

      # Create a GitHub Release for this tag and attach the .dmg file.
      # GITHUB_TOKEN is provided automatically — no secrets to configure.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openbook-lm-arm64.dmg
          draft: false
          generate_release_notes: false
          body: |
            ## Install

            Download the `.dmg` file below.

            **First launch on macOS:** Apple will warn that the app is unsigned.
            Right-click the app → **Open** → **Open** to bypass the warning.
            You only need to do this once.
