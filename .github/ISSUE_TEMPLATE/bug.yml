name: Bug
description: Something broken or behaving wrong
labels: [bug]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a notebook with a PDF
        2. Ask "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Model in use, folder size, macOS version — anything that might be relevant.
